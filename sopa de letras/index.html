<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Sopa de Letras Mágico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- html2pdf.js library for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <main class="container">
        <header>
            <h1>Sopa de <span class="highlight">Letras</span></h1>
            <p>Crea tu propio rompecabezas personalizado al instante.</p>
        </header>

        <section class="controls glass-panel">
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.5rem;">
                    <label for="words-input" style="margin-bottom: 0;">Palabras (una por línea o separadas por coma, hasta 30):</label>
                    <button id="random-words-btn" class="secondary-btn" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" title="Llenar con palabras aleatorias">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l4.1-5.6a4 4 0 0 1 3.3-1.7H22"/><path d="m18 6 4 3-4 3"/><path d="M2 6h1.4c1.3 0 2.5.6 3.3 1.7l4.1 5.6a4 4 0 0 0 3.3 1.7H22"/><path d="m18 15 4 3-4 3"/></svg>
                        Aleatorias
                    </button>
                </div>
                <textarea id="words-input" placeholder="Ejemplo:&#10;GATO&#10;PERRO&#10;PÁJARO" rows="6"></textarea>
                <div class="word-count">Palabras: <span id="word-count-display">0</span>/30</div>
            </div>

            <div class="settings-group">
                <div class="setting">
                    <label for="difficulty">Nivel de Dificultad:</label>
                    <select id="difficulty">
                        <option value="easy">Fácil (Horizontal/Vertical)</option>
                        <option value="medium" selected>Medio (+ Diagonales)</option>
                        <option value="hard">Difícil (+ Invertidas)</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="grid-size-auto">Tamaño de Cuadrícula:</label>
                    <div class="size-controls">
                        <input type="checkbox" id="grid-size-auto" checked> 
                        <label for="grid-size-auto" class="checkbox-label">Automático</label>
                    </div>
                </div>
                <div class="setting" id="manual-size-container" style="display: none;">
                     <label for="grid-size">Tamaño Manual:</label>
                     <input type="range" id="grid-size" min="10" max="40" value="15" step="1">
                     <span id="grid-size-display">15x15</span>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.21 1.21 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>
                Generar Sopa de Letras
            </button>
        </section>

        <section class="output-area" id="output-area" style="display: none;">
            <div class="actions glass-panel" id="action-buttons">
                <button id="print-btn" class="secondary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    Imprimir
                </button>
                <button id="pdf-btn" class="secondary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Descargar PDF
                </button>
                <button id="solve-btn" class="secondary-btn outline">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h10"/><path d="M9 4v16"/><path d="m3 9 3 3-3 3"/></svg>
                    Mostrar Solución
                </button>
            </div>

            <div class="game-container" id="pdf-content">
                <div class="grid-wrapper glass-panel">
                    <!-- Title for PDF context (hidden normally, visible in PDF/Print) -->
                    <h2 class="pdf-title" style="display: none; text-align: center; margin-bottom: 20px; font-size: 24px; color: black; font-weight: bold;">Sopa de Letras</h2>
                    <div id="word-grid" class="word-grid"></div>
                </div>
                
                <div class="word-list-wrapper glass-panel">
                    <h3>Palabras a Encontrar:</h3>
                    <ul id="word-list" class="word-list"></ul>
                </div>
            </div>
        </section>
        
        <div id="error-message" class="error-toast"></div>
    </main>

    <script src="palabras.js"></script>
    <script src="script.js"></script>
</body>
</html>
